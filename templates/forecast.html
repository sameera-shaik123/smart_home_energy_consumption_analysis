<!DOCTYPE html>
<html>
<head>
    <title>Energy Forecast</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body class="forecast-body">

<div class="forecast-container">

    <h2>🔮 Energy Prediction</h2>

    <!-- ❗ NO FORM TAG (PREVENTS GET REQUEST) -->
    <div class="form-box">
        <label for="energy">Energy Input (kWh)</label>
        <input type="number" id="energy" min="0" placeholder="Enter energy (kWh)">

        <label for="device">Select Device</label>
        <select id="device">
            <option value="">Select Device</option>
            <option value="AC">AC</option>
            <option value="Light">Light</option>
            <option value="TV">TV</option>
            <option value="Fridge">Fridge</option>
            <option value="Washer">Washer</option>
        </select>

        <label for="horizon">Prediction Horizon</label>
        <select id="horizon">
            <option value="">Prediction Horizon</option>
            <option value="hour">Next Hour</option>
            <option value="day">Next Day</option>
            <option value="week">Next Week</option>
            <option value="month">Next Month</option>
        </select>
        

        <!-- ❗ BUTTON IS NOT SUBMIT -->
        <button type="button" onclick="predictEnergy()">📈 Predict</button>
    </div>

    <!-- RESULT -->
    <div id="result-box" class="hidden">
        <h3>📊 Prediction Result</h3>

        <!-- LOADER -->
        <div id="loader" class="hidden" style="text-align:center; margin:20px;">
            <div class="spinner"></div>
            <p>Calculating energy prediction…</p>
        </div>

        <!-- PREDICTIONS -->
        <div id="prediction-list"></div>

        <!-- Removed visualizations and tip box from this page per requirements -->

        <div style="margin-top:20px; display:flex; gap:12px; justify-content:center;">
            <button class="back-home-btn" onclick="window.location.href='/'">⬅ Back to Home</button>
            <button id="visualize-btn">📊 Visualize</button>
        </div>
    </div>


</div>

<script src="{{ url_for('static', filename='forecast.js') }}"></script>
</body>
</html>
