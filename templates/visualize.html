<!DOCTYPE html><html><head><title>Energy Forecast Visualization</title>
<link rel="stylesheet" href="{{ url_for('static', filename='visualize.css') }}">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>


<style>

body{
font-family:Arial;
background:#cee3f9;
margin:0;
padding:0;
}

.container{
width:95%;
margin:auto;
padding:20px;
}

.top-section{
display:flex;
gap:20px;
margin-bottom:20px;
}

.tip-box{
flex:2;
background:#f4cc9b;
padding:15px;
border-radius:10px;
}

.kpi-card{
flex:1;
background:#2563eb;
color:white;
padding:20px;
border-radius:10px;
text-align:center;
}

.chart{
background:rgb(17, 17, 17);
padding:4px;
margin-bottom:20px;
border-radius:10px;
}

.explain{
background:rgb(232, 224, 224);
padding:10px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
background:#98bedb;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>


</head>

<body>
<div class="container">
<div class="top-section">
<div class="tip-box" id="tip">
</div>
<div class="kpi-card" id="kpi">
<h3>Total Energy Prediction</h3>
<h2 id="kpi-value"></h2>
</div>
</div>
<div id="charts"></div>
<div style="text-align:center">
</div>
</div>

<!-- Forecast Report Section -->
 <div style="margin-top:30px; background:rgb(242, 239, 239); padding:15px; border-radius:10px;">
<h3>Forecast Report</h3>
<div style="display:flex; gap:15px; margin-top:10px;">
<button onclick="downloadPDF()" 
style="background:#ef4444;color:white;padding:10px 18px;border:none;border-radius:6px;cursor:pointer;">Get PDF
</button>

<button onclick="goBack()" 
style="background:#b593f0;color:white;padding:10px 18px;border:none;border-radius:6px;cursor:pointer;">
Back to Forecast
</button>

</div></div>

<script>
function goBack(){
window.location.href="/forecast"
}
</script>


<script>
window.DATA = {
    dates: {{ dates | safe }},
    values: {{ predictions | safe }},
    tip: {{ tip | tojson }},
    horizon: {{ horizon | tojson }}
};
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script> -->
<script src="{{ url_for('static', filename='visualize.js') }}"></script>

</body>
</html>
